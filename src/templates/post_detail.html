<a
  href="/"
  class="inline-flex items-center gap-1 text-sm text-[#D02020] hover:text-stone-900 transition-colors mb-6"
>
  &larr; Back to feed
</a>
<article>
  <header class="mb-8 pb-6 border-b border-stone-100">
    <p class="text-xs font-bold tracking-widest uppercase text-[#D02020] mb-3">
      $topic
    </p>
    <h1
      class="text-3xl md:text-4xl font-semibold tracking-tight leading-tight mb-3"
    >
      $title
    </h1>
    <p class="text-sm text-stone-400">$published_date</p>
  </header>
  <p class="text-lg text-stone-600 font-light leading-relaxed mb-8">$excerpt</p>
  <div class="prose prose-stone max-w-none">
    <pre
      class="whitespace-pre-wrap rounded-xl bg-stone-50 border border-stone-100 p-6 text-sm text-stone-700 leading-relaxed"
    >
$content_markdown</pre
    >
  </div>
</article>
