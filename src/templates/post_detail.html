<div class="mb-4">
  <a
    href="/read"
    class="inline-flex items-center gap-1 text-xs font-semibold tracking-wide text-stone-400 hover:text-[#D02020] transition-colors"
  >
    &larr; Back
  </a>
</div>
<article class="bg-white rounded-xl border border-stone-200 shadow-sm overflow-hidden">
  <div class="px-5 pt-5 pb-4 border-b border-stone-100">
    <span
      class="text-[10px] font-bold tracking-widest uppercase text-[#D02020]"
      >$topic</span
    >
    <h1 class="text-xl font-semibold tracking-tight leading-snug mt-1.5">
      $title
    </h1>
    <p class="text-xs text-stone-400 mt-1.5">$published_date</p>
  </div>
  <div class="px-5 py-4">
    <p class="text-sm text-stone-500 leading-relaxed mb-4">$excerpt</p>
    <div
      class="whitespace-pre-wrap rounded-lg bg-stone-50 border border-stone-100 p-4 text-sm text-stone-700 leading-relaxed"
    >
      $content_markdown
    </div>
  </div>
</article>
