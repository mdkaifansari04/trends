<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#D02020" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <title>$title — Trends</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/logo/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/logo/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/logo/favicon-16x16.png" />
    <link rel="icon" type="image/x-icon" href="/logo/favicon.ico" />
    <link rel="manifest" href="/logo/site.webmanifest" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "EB Garamond", serif;
      }
      ::selection {
        background: #d02020;
        color: #fff;
      }
      body {
        overscroll-behavior-y: none;
      }
    </style>
  </head>
  <body class="min-h-screen bg-stone-50 text-stone-900 antialiased">
    <!-- App bar -->
    <nav
      class="sticky top-0 z-50 bg-white border-b border-stone-200 shadow-sm"
    >
      <div
        class="max-w-2xl mx-auto px-4 h-12 flex items-center justify-between"
      >
        <a href="/read" class="flex items-center gap-2">
          <img
            src="/images/logo.png"
            alt="Trends"
            class="w-5 h-5 rounded"
          />
          <span class="font-semibold text-sm tracking-tight">Trends</span>
        </a>
        <a
          href="/read"
          class="text-xs font-semibold tracking-wide text-stone-400 hover:text-[#D02020] transition-colors"
          >Feed</a
        >
      </div>
    </nav>

    <main class="mx-auto max-w-2xl px-4 py-6">$content</main>
  </body>
</html>
