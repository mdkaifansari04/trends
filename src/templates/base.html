<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>$title — Trends</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link
      href="https://fonts.googleapis.com/css2?family=EB+Garamond:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        font-family: "EB Garamond", serif;
      }
      ::selection {
        background: #d02020;
        color: #fff;
      }
    </style>
  </head>
  <body class="min-h-screen bg-white text-stone-900 antialiased">
    <!-- Navigation -->
    <nav
      class="sticky top-0 z-50 bg-white/80 backdrop-blur-md border-b border-stone-100"
    >
      <div
        class="max-w-5xl mx-auto px-6 h-14 flex items-center justify-between"
      >
        <a href="/" class="flex items-center gap-2">
          <img src="/images/logo.png" alt="Trends" class="w-6 h-6 rounded-md" />
          <span class="font-semibold text-base tracking-tight">Trends</span>
        </a>
        <a
          href="/"
          class="text-xs font-semibold tracking-widest uppercase text-stone-500 hover:text-[#D02020] transition-colors"
          >Home</a
        >
      </div>
    </nav>

    <main class="mx-auto max-w-3xl px-6 py-10">$content</main>

    <!-- Footer -->
    <footer class="border-t border-stone-100 py-8">
      <div
        class="max-w-5xl mx-auto px-6 flex flex-col md:flex-row items-center justify-between gap-4"
      >
        <div class="flex items-center gap-2">
          <img src="/images/logo.png" alt="Trends" class="w-5 h-5 rounded-md" />
          <span class="text-sm font-semibold tracking-tight text-stone-400"
            >Trends</span
          >
        </div>
        <p class="text-xs text-stone-300">
          © 2026 Trends. All rights reserved.
        </p>
      </div>
    </footer>
  </body>
</html>
